# ─────────────────────────────────────────────────────────────────────────────
# observability-agent — nginx config
#
# Grafana is protected by NitroNode Better Auth:
#   1. nginx makes a subrequest to NitroNode /api/auth/check
#   2. If 200 → injects X-WEBAUTH-USER (email) → Grafana auto-logs in (auth.proxy)
#   3. If 401 → redirects browser to NitroNode /sign-in
#
# IMPORTANT: All API proxies use rewrite + proxy_pass $var (no trailing URI)
#   because nginx with variable proxy_pass does NOT strip the location prefix
#   automatically. The rewrite rule strips it explicitly before forwarding.
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 8080;
    server_name _;

    # Docker internal DNS resolver — runtime hostname resolution
    # Prevents nginx startup failures when backends are not yet ready
    resolver 127.0.0.11 valid=10s ipv6=off;

    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_connect_timeout 10s;

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"observability-agent"}';
        add_header Content-Type application/json;
    }

    # ── OTel Collector health ─────────────────────────────────────────────────
    location = /collector/health {
        set $otel_upstream http://127.0.0.1:13133;
        proxy_pass $otel_upstream;
    }

    # ── Internal NitroNode auth subrequest ────────────────────────────────────
    # Validates the Better Auth session cookie forwarded from the browser.
    #
    # NITRONODE_APP_URL env var (default: host.docker.internal:3000) lets this
    # work on both macOS (host.docker.internal resolves) and Linux Docker hosts
    # (where host.docker.internal may not exist — set NITRONODE_APP_URL to the
    # host's actual IP or a Docker network alias instead).
    #
    # In K8s: set NITRONODE_APP_URL to the browser-ui ClusterIP service hostname.
    location = /nitronode-auth {
        internal;
        set $nitronode_app "${NITRONODE_APP_URL}";
        proxy_pass $nitronode_app/api/auth/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie        $http_cookie;
        proxy_set_header X-Real-IP     $remote_addr;
        proxy_set_header X-Original-URI $request_uri;
    }

    # ── NitroNode API proxy ───────────────────────────────────────────────────
    # Allows the observability SPA to read authenticated, user-scoped PostgreSQL
    # summaries from the main app while staying same-origin at :8085.
    location /api/nitronode/ {
        set $nitronode_app "${NITRONODE_APP_URL}";
        rewrite ^/api/nitronode/(.*) /$1 break;
        proxy_pass $nitronode_app;
        proxy_set_header Host              $host;
        proxy_set_header Cookie            $http_cookie;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # ── Prometheus API proxy ──────────────────────────────────────────────────
    # Strips /api/prometheus/ prefix via rewrite before forwarding.
    # Example: /api/prometheus/-/healthy → http://observability-prometheus:9090/-/healthy
    location = /api/prometheus {
        return 301 /api/prometheus/;
    }
    location /api/prometheus/ {
        set $prometheus_upstream http://observability-prometheus:9090;
        rewrite ^/api/prometheus/(.*) /$1 break;
        proxy_pass $prometheus_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # ── Loki API proxy ────────────────────────────────────────────────────────
    # Strips /api/loki/ prefix via rewrite before forwarding.
    # Example: /api/loki/ready → http://observability-loki:3100/ready
    location /api/loki/ {
        set $loki_upstream http://observability-loki:3100;
        rewrite ^/api/loki/(.*) /$1 break;
        proxy_pass $loki_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # ── Tempo API proxy ───────────────────────────────────────────────────────
    # Strips /api/tempo/ prefix via rewrite before forwarding.
    # Example: /api/tempo/ready → http://observability-tempo:3200/ready
    location /api/tempo/ {
        set $tempo_upstream http://observability-tempo:3200;
        rewrite ^/api/tempo/(.*) /$1 break;
        proxy_pass $tempo_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # ── Grafana — protected by NitroNode Better Auth ──────────────────────────
    # ALL access to Grafana goes through this proxy.
    # nginx validates the NitroNode session via auth_request before forwarding.
    #
    # NOTE: ^~ on the prefix prevents the static-asset regex below from catching
    # Grafana's JS/CSS files (e.g. /api/grafana/public/build/app.js).
    #
    # NOTE: NO rewrite here — Grafana has GF_SERVER_SERVE_FROM_SUB_PATH=true,
    # meaning it expects the full /api/grafana/... path and strips the sub-path
    # internally. Adding a rewrite that strips /api/grafana/ before forwarding
    # causes a redirect loop: Grafana tries to re-add the prefix → nginx strips it
    # again → Grafana redirects again → ERR_TOO_MANY_REDIRECTS.
    location = /api/grafana {
        return 301 /api/grafana/;
    }
    location ^~ /api/grafana/ {
        # 1. Validate NitroNode session (subrequest to Better Auth)
        auth_request /nitronode-auth;

        # 2. Capture validated user identity from auth check response headers
        auth_request_set $nn_user_email $upstream_http_x_user_email;
        auth_request_set $nn_user_id    $upstream_http_x_user_id;

        # 3. Inject SINGLE X-WEBAUTH-USER header (email) — Grafana auth.proxy reads this
        proxy_set_header X-WEBAUTH-USER      $nn_user_email;
        proxy_set_header X-Nitronode-User-ID $nn_user_id;

        # 4. Forward full path — GF_SERVER_SERVE_FROM_SUB_PATH strips /api/grafana/ internally
        set $grafana_upstream http://observability-grafana:3000;
        proxy_pass $grafana_upstream;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 5. On auth failure: redirect browser to NitroNode sign-in
        error_page 401 = @grafana_unauth;
    }
    location @grafana_unauth {
        return 302 http://localhost:3000/sign-in;
    }

    # ── Jaeger UI + Query API proxy ────────────────────────────────────────────
    # Jaeger runs on port 16686 with QUERY_BASE_PATH=/api/jaeger.
    # This means Jaeger serves:
    #   UI    at /api/jaeger/
    #   API   at /api/jaeger/api/services, /api/jaeger/api/traces, etc.
    # We forward the path AS-IS (no strip) so Jaeger's base-path logic works.
    location = /api/jaeger {
        return 301 /api/jaeger/;
    }
    location /api/jaeger/ {
        set $jaeger_upstream http://observability-jaeger:16686;
        proxy_pass $jaeger_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # ── React SPA at /observability/ (production K8s path) ───────────────────
    location /observability/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    # ── React SPA at / (local dev) ────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    # ── Static assets ─────────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
